<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#16213e">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Articulating</title>
<style>
  :root {
    --object: #e63946;
    --nature: #2a9d8f;
    --random: #f4a261;
    --person: #e76f51;
    --world: #264653;
    --action: #9b5de5;
    --spade: #111827;
    --full-game: #3a86ff;
    --ink: #172033;
    --paper: #fffaf2;
    --muted: #a6adbc;
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bot: env(safe-area-inset-bottom, 0px);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  html, body {
    min-height: 100%;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background:
      radial-gradient(circle at 20% 12%, rgba(244, 162, 97, 0.22), transparent 26%),
      radial-gradient(circle at 82% 0%, rgba(42, 157, 143, 0.2), transparent 28%),
      linear-gradient(135deg, #17162b 0%, #16213e 100%);
    color: #fff;
    overscroll-behavior: none;
    -webkit-font-smoothing: antialiased;
  }

  body {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: calc(16px + var(--safe-top)) 16px calc(16px + var(--safe-bot));
    min-height: 100vh;
    min-height: 100dvh;
  }

  .app {
    width: 100%;
    max-width: 620px;
    text-align: center;
  }

  h1 {
    font-size: clamp(1.9rem, 7vw, 2.75rem);
    font-weight: 900;
    letter-spacing: 2px;
    margin-bottom: 6px;
    background: linear-gradient(90deg, #e63946, #f4a261, #2a9d8f, #9b5de5);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }

  .subtitle {
    color: #c7ccda;
    font-size: clamp(0.82rem, 3vw, 0.95rem);
    margin-bottom: 18px;
  }

  .panel {
    background: rgba(255, 250, 242, 0.97);
    color: var(--ink);
    border: 1px solid rgba(255, 255, 255, 0.7);
    border-radius: 16px;
    padding: clamp(16px, 4.2vw, 26px);
    box-shadow: 0 18px 48px rgba(0,0,0,0.45);
  }

  .section-title {
    color: #596174;
    font-size: clamp(0.74rem, 2.7vw, 0.82rem);
    font-weight: 800;
    letter-spacing: 1.2px;
    text-transform: uppercase;
    margin-bottom: 14px;
  }

  .subject-grid {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 10px;
  }

  .subject {
    display: flex;
    min-height: 78px;
    flex-direction: column;
    align-items: flex-start;
    justify-content: space-between;
    border: none;
    border-radius: 10px;
    padding: 13px;
    color: #fff;
    cursor: pointer;
    text-align: left;
    touch-action: manipulation;
    box-shadow: 0 8px 20px rgba(23, 32, 51, 0.16);
    transition: transform 0.08s ease, filter 0.2s ease;
  }

  .subject:focus-visible,
  .action-button:focus-visible,
  .word-button:focus-visible,
  .text-button:focus-visible {
    outline: 3px solid rgba(255, 255, 255, 0.86);
    outline-offset: 3px;
  }

  .subject:active,
  .word-button:active,
  .action-button:active,
  .text-button:active { transform: translateY(1px) scale(0.98); }

  @media (hover: hover) {
    .subject:hover,
    .word-button:hover,
    .action-button:hover,
    .text-button:hover { filter: brightness(1.07); }
  }

  .subject-name {
    font-size: clamp(1rem, 4vw, 1.2rem);
    font-weight: 850;
    line-height: 1.05;
  }

  .subject-count {
    opacity: 0.82;
    font-size: clamp(0.72rem, 2.7vw, 0.8rem);
    font-weight: 750;
    letter-spacing: 0.7px;
    text-transform: uppercase;
  }

  .subject.object { background: var(--object); }
  .subject.nature { background: var(--nature); }
  .subject.random { background: var(--random); }
  .subject.person { background: var(--person); }
  .subject.world  { background: var(--world); }
  .subject.action { background: var(--action); }
  .subject.spade { background: var(--spade); }
  .subject.fullgame {
    grid-column: 1 / -1;
    background: linear-gradient(135deg, var(--full-game), var(--nature) 48%, var(--action));
  }

  .game-stack {
    display: grid;
    gap: 14px;
  }

  .game-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 14px;
    text-align: left;
  }

  .game-title {
    font-size: clamp(1.45rem, 6vw, 2rem);
    font-weight: 900;
    line-height: 1.05;
  }

  .game-subtitle {
    margin-top: 5px;
    color: #687083;
    font-size: clamp(0.82rem, 3vw, 0.95rem);
    line-height: 1.35;
  }

  .team-grid {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 10px;
  }

  .team-card {
    border-radius: 12px;
    background: rgba(23, 32, 51, 0.08);
    padding: 11px;
    text-align: left;
  }

  .team-card.current {
    background: rgba(58, 134, 255, 0.14);
    box-shadow: inset 0 0 0 2px rgba(58, 134, 255, 0.35);
  }

  .team-label {
    color: #687083;
    font-size: 0.72rem;
    font-weight: 900;
    letter-spacing: 0.9px;
    text-transform: uppercase;
  }

  .team-score {
    margin-top: 4px;
    color: var(--ink);
    font-size: 1.5rem;
    font-weight: 900;
    line-height: 1;
  }

  .board-track {
    display: grid;
    grid-template-columns: repeat(8, minmax(0, 1fr));
    gap: 5px;
  }

  .board-space {
    position: relative;
    display: grid;
    min-height: 34px;
    place-items: center;
    border-radius: 8px;
    color: #fff;
    font-size: 0.62rem;
    font-weight: 900;
    letter-spacing: 0.4px;
    line-height: 1;
    overflow: hidden;
  }

  .board-space.start,
  .board-space.finish {
    background: #172033;
  }

  .board-space.object { background: var(--object); }
  .board-space.nature { background: var(--nature); }
  .board-space.random { background: var(--random); }
  .board-space.person { background: var(--person); }
  .board-space.action { background: var(--action); }
  .board-space.world { background: var(--world); }
  .board-space.spade { background: var(--spade); }
  .board-space.control {
    color: var(--ink);
    background: #fff;
    box-shadow: inset 0 0 0 2px rgba(23, 32, 51, 0.18);
  }

  .token-stack {
    position: absolute;
    inset: 3px;
    display: flex;
    align-items: flex-end;
    justify-content: center;
    gap: 2px;
  }

  .token {
    display: grid;
    width: 16px;
    height: 16px;
    place-items: center;
    border: 2px solid #fff;
    border-radius: 50%;
    color: #fff;
    font-size: 0.6rem;
    font-weight: 900;
    box-shadow: 0 2px 6px rgba(0,0,0,0.25);
  }

  .token.team-0 { background: #3a86ff; }
  .token.team-1 { background: #e63946; }

  .spinner-panel {
    display: grid;
    grid-template-columns: 150px minmax(0, 1fr);
    align-items: center;
    gap: 16px;
    border-radius: 14px;
    background: rgba(23, 32, 51, 0.08);
    padding: 14px;
  }

  .spinner-stage {
    position: relative;
    display: grid;
    place-items: center;
  }

  .spinner-pointer {
    position: absolute;
    top: -8px;
    z-index: 1;
    width: 0;
    height: 0;
    border-left: 10px solid transparent;
    border-right: 10px solid transparent;
    border-top: 18px solid #172033;
  }

  .spinner {
    width: min(132px, 35vw);
    aspect-ratio: 1;
    border: 6px solid #fff;
    border-radius: 50%;
    background:
      conic-gradient(
        #2a9d8f 0deg 108deg,
        #f4a261 108deg 180deg,
        #2a9d8f 180deg 232deg,
        #e63946 232deg 308deg,
        #111827 308deg 360deg
      );
    box-shadow: 0 10px 24px rgba(23, 32, 51, 0.22);
    transform: rotate(var(--spin-rotation, 0deg));
    transition: transform 0.75s cubic-bezier(.2,.8,.2,1);
  }

  .spinner-copy {
    text-align: left;
  }

  .spinner-label {
    color: #687083;
    font-size: 0.72rem;
    font-weight: 900;
    letter-spacing: 0.9px;
    text-transform: uppercase;
  }

  .spinner-result {
    margin-top: 5px;
    font-size: clamp(1.25rem, 5vw, 1.7rem);
    font-weight: 900;
    line-height: 1.05;
  }

  .game-actions {
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
    gap: 10px;
  }

  .challenge-actions,
  .bonus-actions {
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
    gap: 10px;
  }

  .round-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    margin-bottom: 16px;
  }

  .round-topbar {
    display: flex;
    justify-content: flex-start;
    margin-bottom: 14px;
  }

  .round-kicker {
    color: #687083;
    font-size: clamp(0.72rem, 2.8vw, 0.8rem);
    font-weight: 800;
    letter-spacing: 1px;
    text-align: left;
    text-transform: uppercase;
  }

  .round-title {
    font-size: clamp(1.45rem, 6vw, 2rem);
    font-weight: 900;
    text-align: left;
  }

  .timer {
    display: grid;
    min-width: 84px;
    min-height: 84px;
    place-items: center;
    border-radius: 50%;
    background: #172033;
    color: #fff;
    font-size: clamp(1.55rem, 7vw, 2.1rem);
    font-weight: 900;
    font-variant-numeric: tabular-nums;
    box-shadow: inset 0 0 0 5px rgba(255,255,255,0.12);
  }

  .timer.warning { background: #e63946; }

  .score-row {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 10px;
    margin-bottom: 16px;
  }

  .stat {
    border-radius: 10px;
    background: rgba(23, 32, 51, 0.08);
    padding: 10px;
    text-align: left;
  }

  .stat-label {
    color: #687083;
    font-size: 0.72rem;
    font-weight: 800;
    letter-spacing: 0.9px;
    text-transform: uppercase;
  }

  .stat-value {
    margin-top: 3px;
    color: var(--ink);
    font-size: 1.45rem;
    font-weight: 900;
    line-height: 1;
  }

  .word-list {
    display: grid;
    gap: 10px;
    margin-bottom: 16px;
  }

  .word-button {
    width: 100%;
    min-height: 58px;
    border: 2px solid transparent;
    border-radius: 10px;
    background: #fff;
    color: var(--ink);
    cursor: pointer;
    font-size: clamp(1rem, 4.5vw, 1.25rem);
    font-weight: 800;
    line-height: 1.2;
    padding: 13px 14px;
    touch-action: manipulation;
    word-break: break-word;
    box-shadow: 0 6px 18px rgba(23, 32, 51, 0.1);
    transition: transform 0.08s ease, border-color 0.2s ease, opacity 0.2s ease;
  }

  .word-button.ready {
    color: #7b8292;
    background: rgba(255,255,255,0.72);
    box-shadow: none;
  }

  .word-button:disabled {
    cursor: default;
    opacity: 0.62;
    transform: none;
  }

  .round-actions {
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
    gap: 10px;
  }

  .audit-panel {
    margin-top: 14px;
    border-radius: 14px;
    background: rgba(23, 32, 51, 0.08);
    padding: 14px;
    text-align: left;
  }

  .audit-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    margin-bottom: 12px;
  }

  .audit-title {
    color: #596174;
    font-size: 0.72rem;
    font-weight: 900;
    letter-spacing: 0.9px;
    text-transform: uppercase;
  }

  .audit-subtitle {
    margin-top: 4px;
    color: #687083;
    font-size: 0.86rem;
    line-height: 1.35;
  }

  .audit-score {
    display: grid;
    grid-template-columns: 52px minmax(0, 1fr) 52px;
    align-items: center;
    gap: 8px;
    margin-bottom: 12px;
  }

  .audit-score-value {
    display: grid;
    min-height: 52px;
    place-items: center;
    border-radius: 10px;
    background: #fff;
    color: var(--ink);
    font-size: 1.45rem;
    font-weight: 900;
    box-shadow: 0 5px 14px rgba(23, 32, 51, 0.08);
  }

  .audit-stepper {
    min-width: 52px;
    min-height: 52px;
    padding: 0;
    border-radius: 12px;
    font-size: 1.3rem;
    letter-spacing: 0;
  }

  .audit-list {
    display: grid;
    gap: 8px;
  }

  .audit-row {
    display: grid;
    grid-template-columns: minmax(0, 1fr) auto;
    align-items: center;
    gap: 8px;
    border-radius: 10px;
    background: rgba(255, 255, 255, 0.78);
    padding: 9px 10px;
  }

  .audit-row.removed {
    opacity: 0.52;
  }

  .audit-word {
    min-width: 0;
  }

  .audit-word-main {
    color: var(--ink);
    font-size: 0.95rem;
    font-weight: 850;
    line-height: 1.2;
    word-break: break-word;
  }

  .audit-word-meta {
    margin-top: 2px;
    color: #687083;
    font-size: 0.68rem;
    font-weight: 850;
    letter-spacing: 0.7px;
    text-transform: uppercase;
  }

  .audit-empty {
    color: #687083;
    font-size: 0.86rem;
    line-height: 1.4;
    text-align: center;
  }

  .action-button,
  .text-button {
    border: none;
    border-radius: 999px;
    cursor: pointer;
    font-size: clamp(0.86rem, 3.5vw, 0.95rem);
    font-weight: 850;
    letter-spacing: 0.8px;
    text-transform: uppercase;
    touch-action: manipulation;
    transition: transform 0.08s ease, filter 0.2s ease, opacity 0.2s ease;
  }

  .action-button {
    min-height: 52px;
    min-width: 150px;
    padding: 15px 28px;
    background: linear-gradient(90deg, #e63946, #9b5de5);
    color: #fff;
    box-shadow: 0 8px 24px rgba(155, 93, 229, 0.34);
  }

  .text-button {
    min-height: 46px;
    padding: 12px 18px;
    background: rgba(23, 32, 51, 0.09);
    color: var(--ink);
  }

  .text-button:disabled {
    cursor: default;
    opacity: 0.45;
    transform: none;
  }

  .action-button:disabled {
    cursor: default;
    opacity: 0.55;
    transform: none;
  }

  .hidden { display: none; }

  .empty-note {
    color: #687083;
    font-size: 0.9rem;
    line-height: 1.45;
    margin-bottom: 16px;
  }

  @media (max-width: 430px) {
    .subject-grid { grid-template-columns: 1fr; }
    .round-header { align-items: flex-start; }
    .game-header { flex-direction: column; }
    .team-grid { grid-template-columns: 1fr; }
    .board-track { grid-template-columns: repeat(6, minmax(0, 1fr)); }
    .spinner-panel {
      grid-template-columns: 1fr;
      justify-items: center;
      text-align: center;
    }
    .spinner-copy { text-align: center; }
    .game-actions .action-button,
    .game-actions .text-button,
    .round-actions .action-button,
    .round-actions .text-button,
    .audit-row .text-button {
      width: 100%;
    }
    .audit-header { align-items: flex-start; }
    .audit-row { grid-template-columns: 1fr; }
    .timer { min-width: 72px; min-height: 72px; }
  }
</style>
</head>
<body>
<div class="app">
  <h1>Articulating</h1>
  <div class="subtitle" id="subtitle">choose a subject to start a round</div>

  <section id="chooser" class="panel" aria-labelledby="chooser-title">
    <div id="chooser-title" class="section-title">Subject</div>
    <div class="subject-grid" id="subject-grid"></div>
  </section>

  <section id="full-game" class="panel hidden" aria-labelledby="full-game-title">
    <div class="round-topbar">
      <button id="full-game-subjects" class="text-button" type="button">Subjects</button>
    </div>

    <div class="game-stack">
      <div class="game-header">
        <div>
          <div class="round-kicker">Full game beta</div>
          <div id="full-game-title" class="game-title">Board and spinner</div>
          <div id="game-status" class="game-subtitle">Team 1 turn. Spin for a subject.</div>
        </div>
        <button id="reset-game" class="text-button" type="button">Reset</button>
      </div>

      <div id="team-grid" class="team-grid"></div>
      <div id="board-track" class="board-track" aria-label="Full game board"></div>

      <div class="spinner-panel">
        <div class="spinner-stage" aria-hidden="true">
          <div class="spinner-pointer"></div>
          <div id="spinner" class="spinner"></div>
        </div>
        <div class="spinner-copy">
          <div class="spinner-label">Bonus spinner</div>
          <div id="spinner-result" class="spinner-result">No bonus</div>
        </div>
      </div>

      <div class="game-actions">
        <button id="play-round" class="action-button" type="button">Play Object</button>
        <button id="spin-subject" class="action-button" type="button" disabled>Spin Bonus</button>
      </div>
      <div id="bonus-actions" class="bonus-actions hidden"></div>
      <div id="challenge-actions" class="challenge-actions hidden"></div>
    </div>
  </section>

  <section id="round" class="panel hidden" aria-live="polite">
    <div class="round-topbar">
      <button id="change-subject" class="text-button" type="button">Subjects</button>
    </div>

    <div class="round-header">
      <div>
        <div class="round-kicker">Current subject</div>
        <div class="round-title" id="round-title">Object</div>
      </div>
      <div class="timer" id="timer">32</div>
    </div>

    <div class="score-row">
      <div class="stat">
        <div class="stat-label">Score</div>
        <div class="stat-value" id="score">0</div>
      </div>
      <div class="stat">
        <div class="stat-label">Choices</div>
        <div class="stat-value" id="choice-count">0</div>
      </div>
    </div>

    <div id="word-list" class="word-list"></div>
    <div id="round-note" class="empty-note">Tap start when your team is ready.</div>

    <div class="round-actions">
      <button id="start" class="action-button" type="button">Start</button>
      <button id="undo" class="text-button" type="button" disabled>Undo</button>
      <button id="audit" class="text-button" type="button">Audit</button>
    </div>

    <div id="audit-panel" class="audit-panel hidden" aria-live="polite">
      <div class="audit-header">
        <div>
          <div class="audit-title">Round audit</div>
          <div class="audit-subtitle">Score check</div>
        </div>
        <button id="close-audit" class="text-button" type="button">Close</button>
      </div>
      <div class="audit-score" aria-label="Edit round points">
        <button id="audit-minus" class="text-button audit-stepper" type="button">-</button>
        <div id="audit-score" class="audit-score-value">0</div>
        <button id="audit-plus" class="text-button audit-stepper" type="button">+</button>
      </div>
      <div id="audit-list" class="audit-list"></div>
    </div>
  </section>
</div>

<script src="words.js?v=atomic-grade12-expanded2"></script>
<script>
const ROUND_SECONDS = 32;
const BOARD_SEGMENTS = [
  { category: 'nature' },
  { category: 'random' },
  { category: 'person' },
  { category: 'action' },
  { category: 'world' },
  { category: 'object' },
  { category: 'spade', special: 'control' },
  { category: 'nature' },
  { category: 'random' },
  { category: 'person' },
  { category: 'action' },
  { category: 'world' },
  { category: 'object' },
  { category: 'spade', special: 'control' },
  { category: 'nature' },
  { category: 'random' },
  { category: 'person' },
  { category: 'action' },
  { category: 'world' },
  { category: 'object' },
  { category: 'spade', special: 'control' },
  { category: 'nature' },
  { category: 'random' },
  { category: 'person' },
  { category: 'action' },
  { category: 'world' },
  { category: 'spade', special: 'control' },
  { category: 'object' }
];
const SPIN_BONUSES = [
  { amount: 2, label: '2-place bonus' },
  { amount: 0, label: 'No bonus' },
  { amount: 2, label: '2-place bonus' },
  { amount: 3, label: '3-place bonus' },
  { amount: 0, label: 'No bonus' }
];

const SUBJECTS = [
  { id: 'fullgame', label: 'Full Game (Beta)', choices: 0, className: 'fullgame', boardGame: true },
  { id: 'object', label: 'Object', choices: 2, className: 'object' },
  { id: 'nature', label: 'Nature', choices: 2, className: 'nature' },
  { id: 'random', label: 'Random', choices: 2, className: 'random' },
  { id: 'person', label: 'Person', choices: 4, className: 'person' },
  { id: 'action', label: 'Action', choices: 2, className: 'action' },
  { id: 'world', label: 'World', choices: 3, className: 'world' },
  { id: 'spade', label: 'Spade Round', choices: 1, className: 'spade', randomCategory: true }
];

const STORAGE_KEY = 'articulatingDeckStateV6';
const WORD_CATEGORIES = Object.keys(WORDS);
const CATEGORY_LABELS = Object.fromEntries(SUBJECTS.map(subject => [subject.id, subject.label]));
const orderCache = new Map();

const state = {
  subject: null,
  score: 0,
  seconds: ROUND_SECONDS,
  running: false,
  timerId: null,
  words: [],
  lastAction: null,
  fullGameRound: false,
  finalSpadeRound: false,
  roundComplete: false,
  scoredLog: [],
  auditOpen: false
};

const gameState = {
  active: false,
  teams: [
    { name: 'Team 1', position: 0 },
    { name: 'Team 2', position: 0 }
  ],
  currentTeam: 0,
  lastRound: null,
  spinnerRotation: 0,
  winner: null,
  phase: 'ready',
  spinBonus: null
};

const fullGame = document.getElementById('full-game');
const round = document.getElementById('round');

function createSeed() {
  if (window.crypto && window.crypto.getRandomValues) {
    const values = new Uint32Array(4);
    window.crypto.getRandomValues(values);
    return Array.from(values, value => value.toString(36)).join('-');
  }
  return `${Date.now().toString(36)}-${Math.random().toString(36).slice(2)}`;
}

function defaultDeckState(seed = createSeed()) {
  return {
    seed,
    randomCounter: 0,
    decks: Object.fromEntries(WORD_CATEGORIES.map(category => [category, { index: 0, cycle: 0 }]))
  };
}

function normalizeDeckState(saved) {
  const deckState = saved && typeof saved === 'object' ? saved : {};
  const normalized = defaultDeckState(typeof deckState.seed === 'string' ? deckState.seed : createSeed());
  normalized.randomCounter = Number.isInteger(deckState.randomCounter) && deckState.randomCounter >= 0
    ? deckState.randomCounter
    : 0;

  for (const category of WORD_CATEGORIES) {
    const savedDeck = deckState.decks && deckState.decks[category];
    if (!savedDeck) continue;

    const maxIndex = WORDS[category].length - 1;
    normalized.decks[category] = {
      index: Number.isInteger(savedDeck.index) ? Math.min(Math.max(savedDeck.index, 0), maxIndex) : 0,
      cycle: Number.isInteger(savedDeck.cycle) && savedDeck.cycle >= 0 ? savedDeck.cycle : 0
    };
  }

  return normalized;
}

function loadDeckState() {
  try {
    return normalizeDeckState(JSON.parse(localStorage.getItem(STORAGE_KEY)));
  } catch {
    return defaultDeckState();
  }
}

const deckState = loadDeckState();

function saveDeckState() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(deckState));
  } catch {
    // The game still works if storage is unavailable; it just cannot resume the same deck later.
  }
}

function hashText(text) {
  let hash = 2166136261;
  for (let index = 0; index < text.length; index++) {
    hash ^= text.charCodeAt(index);
    hash = Math.imul(hash, 16777619);
  }
  return hash >>> 0;
}

function seededRandom(seedText) {
  let value = hashText(seedText);
  value += 0x6D2B79F5;
  value = Math.imul(value ^ value >>> 15, value | 1);
  value ^= value + Math.imul(value ^ value >>> 7, value | 61);
  return ((value ^ value >>> 14) >>> 0) / 4294967296;
}

function seededShuffle(items, seedText) {
  const shuffled = [...items];
  for (let index = shuffled.length - 1; index > 0; index--) {
    const swapIndex = Math.floor(seededRandom(`${seedText}:${index}`) * (index + 1));
    [shuffled[index], shuffled[swapIndex]] = [shuffled[swapIndex], shuffled[index]];
  }
  return shuffled;
}

function categoryOrder(category, cycle) {
  const cacheKey = `${deckState.seed}:${category}:${cycle}:${WORDS[category].length}`;
  if (!orderCache.has(cacheKey)) {
    orderCache.set(cacheKey, seededShuffle(WORDS[category], `${deckState.seed}:${category}:${cycle}`));
  }
  return orderCache.get(cacheKey);
}

function warmDeckOrders(subject) {
  const categories = subject.randomCategory ? WORD_CATEGORIES : [subject.id];
  categories.forEach(category => {
    const deck = deckState.decks[category];
    categoryOrder(category, deck.cycle);
  });
}

function pickSubjectCategory(subject) {
  if (!subject.randomCategory) return subject.id;
  const category = WORD_CATEGORIES[Math.floor(seededRandom(`${deckState.seed}:spade:${deckState.randomCounter}`) * WORD_CATEGORIES.length)];
  deckState.randomCounter += 1;
  return category;
}

function drawDeckWord(category) {
  const deck = deckState.decks[category];
  const order = categoryOrder(category, deck.cycle);
  const text = order[deck.index];
  deck.index += 1;

  if (deck.index >= order.length) {
    deck.index = 0;
    deck.cycle += 1;
  }

  saveDeckState();
  return { text, category };
}

function drawCategoryWord(category, usedWords = []) {
  let nextWord = drawDeckWord(category);
  let guard = WORDS[category].length;

  while (usedWords.includes(nextWord.text) && guard > 0) {
    nextWord = drawDeckWord(category);
    guard -= 1;
  }

  return nextWord;
}

function drawWord(subject, usedWords = []) {
  const category = pickSubjectCategory(subject);
  return drawCategoryWord(category, usedWords);
}

function drawWords(subject) {
  const nextWords = [];

  for (let index = 0; index < subject.choices; index++) {
    nextWords.push(drawWord(subject, nextWords.map(item => item.text)));
  }
  return nextWords;
}

function renderSubjects() {
  subjectGrid.innerHTML = '';
  SUBJECTS.forEach(subject => {
    const button = document.createElement('button');
    button.type = 'button';
    button.className = `subject ${subject.className}`;
    button.dataset.subject = subject.id;
    const countLabel = `${subject.choices} ${subject.choices === 1 ? 'choice' : 'choices'}`;
    const detailLabel = subject.boardGame ? 'Board · spinner · teams' : subject.randomCategory ? `Random · ${countLabel}` : countLabel;
    button.innerHTML = `
      <span class="subject-name">${subject.label}</span>
      <span class="subject-count">${detailLabel}</span>
    `;
    button.addEventListener('click', () => selectSubject(subject.id));
    subjectGrid.appendChild(button);
  });
}

function getSubject(subjectId) {
  return SUBJECTS.find(item => item.id === subjectId);
}

function renderTeams() {
  teamGrid.innerHTML = '';
  gameState.teams.forEach((team, index) => {
    const card = document.createElement('div');
    card.className = `team-card ${index === gameState.currentTeam && !gameState.winner ? 'current' : ''}`;
    card.innerHTML = `
      <div class="team-label">${team.name}${index === gameState.currentTeam && !gameState.winner ? ' turn' : ''}</div>
      <div class="team-score">${team.position}/${BOARD_SEGMENTS.length}</div>
    `;
    teamGrid.appendChild(card);
  });
}

function tokenPosition(team) {
  return team.position >= BOARD_SEGMENTS.length ? BOARD_SEGMENTS.length + 1 : team.position;
}

function categoryForPosition(position) {
  if (position <= 0) return 'object';
  if (position > BOARD_SEGMENTS.length) return null;
  return BOARD_SEGMENTS[position - 1].category;
}

function segmentForPosition(position) {
  if (position <= 0 || position > BOARD_SEGMENTS.length) return null;
  return BOARD_SEGMENTS[position - 1];
}

function isSpinCategory(category) {
  return category === 'action' || category === 'random';
}

function renderBoard() {
  boardTrack.innerHTML = '';
  const spaces = [
    { position: 0, label: 'Start', className: 'start' },
    ...BOARD_SEGMENTS.map((segment, index) => ({
      position: index + 1,
      label: segment.special === 'control' ? 'Ctrl' : CATEGORY_LABELS[segment.category].slice(0, 3),
      className: `${getSubject(segment.category).className} ${segment.special || ''}`.trim()
    })),
    { position: BOARD_SEGMENTS.length + 1, label: 'Finish', className: 'finish' }
  ];

  spaces.forEach(space => {
    const tile = document.createElement('div');
    tile.className = `board-space ${space.className}`;
    tile.textContent = space.label;

    const tokensHere = gameState.teams
      .map((team, index) => ({ team, index }))
      .filter(({ team }) => tokenPosition(team) === space.position);

    if (tokensHere.length) {
      const stack = document.createElement('div');
      stack.className = 'token-stack';
      tokensHere.forEach(({ index }) => {
        const token = document.createElement('span');
        token.className = `token team-${index}`;
        token.textContent = index + 1;
        stack.appendChild(token);
      });
      tile.appendChild(stack);
    }

    boardTrack.appendChild(tile);
  });
}

function renderFullGame() {
  if (!gameState.winner && gameState.phase === 'ready' && gameState.teams[gameState.currentTeam].position >= BOARD_SEGMENTS.length) {
    gameState.phase = 'finish';
  }

  renderTeams();
  renderBoard();

  const currentTeam = gameState.teams[gameState.currentTeam];
  const currentCategory = categoryForPosition(currentTeam.position);
  const isFinishPhase = gameState.phase === 'finish';
  const categoryLabel = isFinishPhase ? 'Finish' : currentCategory ? CATEGORY_LABELS[currentCategory] : 'Finish';
  spinner.style.setProperty('--spin-rotation', `${gameState.spinnerRotation}deg`);
  spinnerResult.textContent = gameState.spinBonus ? gameState.spinBonus.label : 'No bonus';
  playRoundButton.textContent = isFinishPhase ? 'Play Spade Round' : `Play ${categoryLabel}`;
  bonusActions.classList.add('hidden');
  bonusActions.innerHTML = '';
  challengeActions.classList.add('hidden');
  challengeActions.innerHTML = '';

  if (gameState.winner) {
    gameStatus.textContent = `${gameState.winner} won. Reset to start a new game.`;
  } else if (gameState.phase === 'finish') {
    gameStatus.textContent = `${currentTeam.name} is at Finish. Play a Spade Round to win.`;
  } else if (gameState.phase === 'control') {
    gameStatus.textContent = `${currentTeam.name} landed on Control. First team to guess gets the next turn.`;
    renderControlChallengeActions();
  } else if (gameState.phase === 'spin-bonus') {
    const spinCategoryLabel = CATEGORY_LABELS[categoryForPosition(currentTeam.position)];
    if (!gameState.spinBonus) {
      gameStatus.textContent = `${currentTeam.name} landed on ${spinCategoryLabel}. Spin bonus first.`;
    } else if (gameState.spinBonus.amount === 0) {
      gameStatus.textContent = `${currentTeam.name} spun No bonus. End the turn.`;
    } else {
      gameStatus.textContent = `${currentTeam.name} spun ${gameState.spinBonus.label}. Choose how to use it, then end the turn.`;
    }
    renderBonusActions();
  } else if (gameState.lastRound) {
    const roundSummary = gameState.lastRound.message || `${gameState.lastRound.team} scored ${gameState.lastRound.score}.`;
    gameStatus.textContent = `${roundSummary} ${currentTeam.name} is on ${categoryLabel}.`;
  } else {
    gameStatus.textContent = `${currentTeam.name} is on ${categoryLabel}.`;
  }

  playRoundButton.disabled = !['ready', 'finish'].includes(gameState.phase) || Boolean(gameState.winner);
  spinSubjectButton.disabled = gameState.phase !== 'spin-bonus' || Boolean(gameState.spinBonus) || Boolean(gameState.winner);
}

function showFullGame() {
  stopTimer();
  gameState.active = true;
  state.subject = null;
  state.running = false;
  state.lastAction = null;
  state.fullGameRound = false;
  state.finalSpadeRound = false;
  state.roundComplete = false;
  chooser.classList.add('hidden');
  round.classList.add('hidden');
  fullGame.classList.remove('hidden');
  subtitle.textContent = 'play the board category, then move by your score';
  renderFullGame();
}

function spinFullGameSubject() {
  if (gameState.winner || gameState.phase !== 'spin-bonus') return;

  const selectedIndex = Math.floor(Math.random() * SPIN_BONUSES.length);
  const selectedBonus = SPIN_BONUSES[selectedIndex];
  const segmentDegrees = 360 / SPIN_BONUSES.length;
  gameState.spinBonus = selectedBonus;
  gameState.lastRound = null;
  gameState.spinnerRotation += 720 + (SPIN_BONUSES.length - selectedIndex) * segmentDegrees - (segmentDegrees / 2);
  renderFullGame();
}

function beginFullGameRound() {
  if (gameState.winner) return;

  if (gameState.phase === 'finish') {
    selectSubject('spade', { fullGameRound: true, finalSpadeRound: true });
    return;
  }

  if (gameState.phase !== 'ready') return;
  const team = gameState.teams[gameState.currentTeam];
  const subjectId = categoryForPosition(team.position);
  if (!subjectId) return;
  selectSubject(subjectId, { fullGameRound: true });
}

function finishFullGameRound() {
  const team = gameState.teams[gameState.currentTeam];
  const roundScore = state.score;

  if (state.finalSpadeRound) {
    gameState.spinBonus = null;
    if (roundScore > 0) {
      gameState.winner = team.name;
      gameState.lastRound = { message: `${team.name} scored ${roundScore} in the final Spade Round.` };
    } else {
      gameState.lastRound = { message: `${team.name} missed the final Spade Round.` };
      passTurn();
    }
    showFullGame();
    return;
  }

  const previousPosition = team.position;
  team.position = Math.min(BOARD_SEGMENTS.length, team.position + roundScore);
  gameState.lastRound = { team: team.name, score: roundScore };
  gameState.spinBonus = null;

  if (team.position >= BOARD_SEGMENTS.length) {
    gameState.phase = 'finish';
  } else if (roundScore > 0) {
    const landedSegment = segmentForPosition(team.position);
    if (landedSegment && landedSegment.special === 'control') {
      gameState.phase = 'control';
    } else if (landedSegment && isSpinCategory(landedSegment.category)) {
      gameState.phase = 'spin-bonus';
    } else {
      passTurn();
    }
  } else {
    team.position = previousPosition;
    passTurn();
  }

  showFullGame();
}

function passTurn() {
  gameState.currentTeam = (gameState.currentTeam + 1) % gameState.teams.length;
  gameState.phase = 'ready';
  gameState.spinBonus = null;
}

function renderBonusActions() {
  if (gameState.phase !== 'spin-bonus' || !gameState.spinBonus) return;

  bonusActions.classList.remove('hidden');
  if (gameState.spinBonus.amount === 0) {
    const button = document.createElement('button');
    button.type = 'button';
    button.className = 'text-button';
    button.textContent = 'End Turn';
    button.addEventListener('click', applyNoSpinBonus);
    bonusActions.appendChild(button);
    return;
  }

  const currentTeam = gameState.teams[gameState.currentTeam];
  const otherTeamIndex = (gameState.currentTeam + 1) % gameState.teams.length;
  const otherTeam = gameState.teams[otherTeamIndex];

  const forwardButton = document.createElement('button');
  forwardButton.type = 'button';
  forwardButton.className = 'text-button';
  forwardButton.textContent = `${currentTeam.name} +${gameState.spinBonus.amount}`;
  forwardButton.addEventListener('click', () => applySpinBonus('forward'));

  const backButton = document.createElement('button');
  backButton.type = 'button';
  backButton.className = 'text-button';
  backButton.textContent = `${otherTeam.name} -${gameState.spinBonus.amount}`;
  backButton.addEventListener('click', () => applySpinBonus('back'));

  bonusActions.append(forwardButton, backButton);
}

function applyNoSpinBonus() {
  const currentTeam = gameState.teams[gameState.currentTeam];
  gameState.lastRound = { message: `${currentTeam.name} spun no bonus.` };
  passTurn();
  renderFullGame();
}

function applySpinBonus(mode) {
  if (!gameState.spinBonus) return;

  const amount = gameState.spinBonus.amount;
  const currentTeam = gameState.teams[gameState.currentTeam];
  const otherTeam = gameState.teams[(gameState.currentTeam + 1) % gameState.teams.length];

  if (mode === 'forward') {
    currentTeam.position = Math.min(BOARD_SEGMENTS.length, currentTeam.position + amount);
    if (currentTeam.position >= BOARD_SEGMENTS.length) {
      gameState.phase = 'finish';
      gameState.spinBonus = null;
      renderFullGame();
      return;
    }
    gameState.lastRound = { message: `${currentTeam.name} moved forward ${amount}.` };
  } else {
    otherTeam.position = Math.max(0, otherTeam.position - amount);
    gameState.lastRound = { message: `${otherTeam.name} moved back ${amount}.` };
  }

  passTurn();
  renderFullGame();
}

function renderControlChallengeActions() {
  challengeActions.classList.remove('hidden');
  gameState.teams.forEach((team, index) => {
    const button = document.createElement('button');
    button.type = 'button';
    button.className = 'text-button';
    button.textContent = `${team.name} first`;
    button.addEventListener('click', () => resolveControlChallenge(index));
    challengeActions.appendChild(button);
  });
}

function resolveControlChallenge(teamIndex) {
  gameState.currentTeam = teamIndex;
  gameState.lastRound = { message: `${gameState.teams[teamIndex].name} won Control.` };
  gameState.phase = 'ready';
  renderFullGame();
}

function resetFullGame() {
  gameState.teams.forEach(team => {
    team.position = 0;
  });
  gameState.currentTeam = 0;
  gameState.lastRound = null;
  gameState.spinnerRotation = 0;
  gameState.winner = null;
  gameState.phase = 'ready';
  gameState.spinBonus = null;
  state.finalSpadeRound = false;
  renderFullGame();
}

function selectSubject(subjectId, options = {}) {
  const subject = SUBJECTS.find(item => item.id === subjectId);
  if (!subject) return;

  if (subject.boardGame && !options.fullGameRound) {
    showFullGame();
    return;
  }

  stopTimer();
  state.subject = subject;
  state.score = 0;
  state.seconds = ROUND_SECONDS;
  state.running = false;
  state.words = Array.from({ length: subject.choices }, () => null);
  state.lastAction = null;
  state.fullGameRound = Boolean(options.fullGameRound);
  state.finalSpadeRound = Boolean(options.finalSpadeRound);
  state.roundComplete = false;
  state.scoredLog = [];
  state.auditOpen = false;

  chooser.classList.add('hidden');
  fullGame.classList.add('hidden');
  round.classList.remove('hidden');
  subtitle.textContent = state.fullGameRound
    ? state.finalSpadeRound
      ? `${gameState.teams[gameState.currentTeam].name} final Spade Round`
      : `${gameState.teams[gameState.currentTeam].name} round`
    : 'tap correct words to score and replace them';
  changeSubjectButton.textContent = state.fullGameRound ? 'Board' : 'Subjects';
  startButton.textContent = 'Start';
  startButton.disabled = false;
  roundNote.textContent = state.finalSpadeRound ? 'Score at least one to win.' : 'Tap start when your team is ready.';
  renderRound();
}

function renderRound() {
  if (!state.subject) return;

  roundTitle.textContent = state.subject.label;
  renderTimer();
  renderScore();
  renderWords();
  renderAudit();
}

function renderTimer() {
  timer.textContent = state.seconds;
  timer.classList.toggle('warning', state.seconds <= 10 && state.running);
}

function renderScore() {
  score.textContent = state.score;
  choiceCount.textContent = state.subject.choices;
  undoButton.disabled = !state.lastAction;
  auditButton.disabled = !state.subject;
}

function renderWords() {
  wordList.innerHTML = '';
  state.words.forEach((word, index) => {
    const button = document.createElement('button');
    button.type = 'button';
    button.className = `word-button ${state.running ? '' : 'ready'}`;
    button.disabled = !state.running;
    button.setAttribute('aria-label', state.running ? `Score ${word.text}` : 'Word hidden until round starts');
    button.textContent = state.running ? word.text : 'Ready';
    button.addEventListener('click', () => scoreWord(index));
    wordList.appendChild(button);
  });
}

function renderAudit() {
  auditPanel.classList.toggle('hidden', !state.auditOpen);
  auditScore.textContent = state.score;
  auditMinusButton.disabled = state.score <= 0;
  auditList.innerHTML = '';

  if (!state.scoredLog.length) {
    const empty = document.createElement('div');
    empty.className = 'audit-empty';
    empty.textContent = 'No scored words yet.';
    auditList.appendChild(empty);
    return;
  }

  state.scoredLog.slice().reverse().forEach(entry => {
    const row = document.createElement('div');
    row.className = `audit-row ${entry.active ? '' : 'removed'}`;

    const word = document.createElement('div');
    word.className = 'audit-word';

    const main = document.createElement('div');
    main.className = 'audit-word-main';
    main.textContent = entry.text;

    const meta = document.createElement('div');
    meta.className = 'audit-word-meta';
    meta.textContent = entry.active ? entry.label : `${entry.label} removed`;

    word.append(main, meta);
    row.appendChild(word);

    if (entry.canRemove) {
      const removeButton = document.createElement('button');
      removeButton.type = 'button';
      removeButton.className = 'text-button';
      removeButton.textContent = entry.active ? 'Remove' : 'Removed';
      removeButton.disabled = !entry.active || state.score <= 0;
      removeButton.addEventListener('click', () => removeAuditEntry(entry.id));
      row.appendChild(removeButton);
    }

    auditList.appendChild(row);
  });
}

function refreshRoundScoreText() {
  renderScore();
  renderAudit();

  if (!state.roundComplete) return;

  if (state.fullGameRound) {
    const teamName = gameState.teams[gameState.currentTeam].name;
    if (state.finalSpadeRound) {
      startButton.textContent = state.score > 0 ? 'Win Game' : 'Pass Turn';
      roundNote.textContent = state.score > 0
        ? `Time. ${teamName} scored ${state.score} in the final Spade Round.`
        : `Time. ${teamName} did not score in the final Spade Round.`;
    } else {
      startButton.textContent = `Add ${state.score}`;
      roundNote.textContent = `Time. Add ${state.score} to ${teamName}'s board position.`;
    }
  }
}

function makeAuditEntry(text, label, canRemove = true) {
  return {
    id: `${Date.now()}-${Math.random().toString(36).slice(2)}`,
    text,
    label,
    active: true,
    canRemove
  };
}

function startRound() {
  if (!state.subject || state.running) return;

  warmDeckOrders(state.subject);
  state.running = true;
  state.seconds = ROUND_SECONDS;
  state.score = 0;
  state.lastAction = null;
  state.roundComplete = false;
  state.scoredLog = [];
  state.auditOpen = false;
  state.words = drawWords(state.subject);
  startButton.disabled = true;
  roundNote.textContent = 'Click a word when your team gets it right.';
  renderRound();

  state.timerId = window.setInterval(() => {
    state.seconds -= 1;
    if (state.seconds <= 0) {
      endRound();
      return;
    }
    renderTimer();
  }, 1000);
}

function endRound() {
  stopTimer();
  state.running = false;
  state.seconds = 0;
  state.lastAction = null;
  state.roundComplete = true;
  startButton.disabled = false;
  if (state.fullGameRound) {
    const teamName = gameState.teams[gameState.currentTeam].name;
    if (state.finalSpadeRound) {
      startButton.textContent = state.score > 0 ? 'Win Game' : 'Pass Turn';
      roundNote.textContent = state.score > 0
        ? `Time. ${teamName} scored ${state.score} in the final Spade Round.`
        : `Time. ${teamName} did not score in the final Spade Round.`;
    } else {
      startButton.textContent = `Add ${state.score}`;
      roundNote.textContent = `Time. Add ${state.score} to ${teamName}'s board position.`;
    }
  } else {
    startButton.textContent = 'Restart';
    roundNote.textContent = 'Time. Start again or choose another subject.';
  }
  renderRound();
}

function stopTimer() {
  if (state.timerId) {
    window.clearInterval(state.timerId);
    state.timerId = null;
  }
}

function scoreWord(index) {
  if (!state.running || !state.words[index]) return;

  const previousWord = state.words[index];
  const randomCounterBefore = deckState.randomCounter;
  const nextWord = drawWord(state.subject, state.words.map(item => item.text));
  const logEntry = makeAuditEntry(previousWord.text, CATEGORY_LABELS[previousWord.category] || previousWord.category);
  state.words[index] = nextWord;
  state.score += 1;
  state.scoredLog.push(logEntry);
  state.lastAction = {
    index,
    previousWord,
    replacementWord: nextWord,
    randomCounterBefore,
    logEntryId: logEntry.id
  };
  renderRound();
}

function undoLastScore() {
  if (!state.lastAction) return;

  const { index, previousWord, randomCounterBefore, logEntryId } = state.lastAction;
  if (Number.isInteger(randomCounterBefore)) {
    deckState.randomCounter = randomCounterBefore;
    saveDeckState();
  }
  // Keep the replacement card consumed so undo cannot replay the same card.
  state.words[index] = previousWord;
  state.score = Math.max(0, state.score - 1);
  markAuditEntryRemoved(logEntryId);
  state.lastAction = null;
  renderRound();
}

function markAuditEntryRemoved(entryId) {
  const entry = state.scoredLog.find(item => item.id === entryId);
  if (entry) entry.active = false;
}

function removeAuditEntry(entryId) {
  const entry = state.scoredLog.find(item => item.id === entryId);
  if (!entry || !entry.active || state.score <= 0) return;

  entry.active = false;
  state.score = Math.max(0, state.score - 1);
  if (state.lastAction && state.lastAction.logEntryId === entryId) {
    state.lastAction = null;
  }
  refreshRoundScoreText();
}

function adjustAuditScore(delta) {
  if (delta < 0 && state.score <= 0) return;

  state.score = Math.max(0, state.score + delta);
  state.scoredLog.push(makeAuditEntry(delta > 0 ? 'Manual +1' : 'Manual -1', 'Adjustment', false));
  refreshRoundScoreText();
}

function toggleAudit() {
  state.auditOpen = !state.auditOpen;
  renderAudit();
}

function closeAudit() {
  state.auditOpen = false;
  renderAudit();
}

function showSubjects() {
  stopTimer();
  gameState.active = false;
  state.subject = null;
  state.running = false;
  state.lastAction = null;
  state.fullGameRound = false;
  state.finalSpadeRound = false;
  state.roundComplete = false;
  state.scoredLog = [];
  state.auditOpen = false;
  chooser.classList.remove('hidden');
  fullGame.classList.add('hidden');
  round.classList.add('hidden');
  subtitle.textContent = 'choose a subject to start a round';
}

function handleStartButton() {
  if (state.fullGameRound && state.roundComplete) {
    finishFullGameRound();
    return;
  }
  startRound();
}

function handleRoundBack() {
  if (state.fullGameRound && gameState.active) {
    showFullGame();
    return;
  }
  showSubjects();
}

startButton.addEventListener('click', handleStartButton);
undoButton.addEventListener('click', undoLastScore);
auditButton.addEventListener('click', toggleAudit);
closeAuditButton.addEventListener('click', closeAudit);
auditMinusButton.addEventListener('click', () => adjustAuditScore(-1));
auditPlusButton.addEventListener('click', () => adjustAuditScore(1));
changeSubjectButton.addEventListener('click', handleRoundBack);
fullGameSubjectsButton.addEventListener('click', showSubjects);
spinSubjectButton.addEventListener('click', spinFullGameSubject);
playRoundButton.addEventListener('click', beginFullGameRound);
resetGameButton.addEventListener('click', resetFullGame);

renderSubjects();
</script>
</body>
</html>
